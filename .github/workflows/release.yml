name: Release

# v1.0.0 처럼 "v"로 시작하는 태그를 push하면 자동으로 릴리즈 zip을 만들어 GitHub Releases에 올립니다.
# 사용:  git tag v1.2.0 && git push origin v1.2.0

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Releases 업로드 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── relay-server 빌드 ──────────────────────────────────────────────────
      - name: Build relay-server
        run: |
          cd relay-server
          npm ci --silent
          npm run build --silent

      # ── figma-plugin 빌드 ──────────────────────────────────────────────────
      - name: Build figma-plugin
        run: |
          cd figma-plugin
          npm ci --silent
          npm run build --silent

      # ── 릴리즈 폴더 조립 ──────────────────────────────────────────────────
      - name: Assemble release package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARGET="release-dist/figma-mcp-bridge"
          mkdir -p "$TARGET/relay-server"
          mkdir -p "$TARGET/figma-plugin"

          # 서버 dist
          cp -r relay-server/dist "$TARGET/relay-server/"
          # production 의존성만
          cd relay-server
          npm install --omit=dev --silent --prefix "../$TARGET/relay-server"
          cd ..

          # 플러그인
          cp figma-plugin/manifest.json "$TARGET/figma-plugin/"
          cp figma-plugin/code.js       "$TARGET/figma-plugin/"
          cp figma-plugin/ui.html       "$TARGET/figma-plugin/"

          # 루트
          cp figma-cli.js   "$TARGET/"
          cp DESIGN.md      "$TARGET/"
          cp README.md      "$TARGET/"
          cp start.command  "$TARGET/"
          chmod +x          "$TARGET/start.command"

          # 하네스
          cp -r .clinerules "$TARGET/"
          [ -d .cline ]      && cp -r .cline "$TARGET/"
          [ -d memory-bank ] && cp -r memory-bank "$TARGET/"

          # 템플릿·스크립트
          cp -r templates "$TARGET/"
          cp -r scripts   "$TARGET/"

      - name: Create zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd release-dist
          zip -qr "../figma-mcp-bridge-v${VERSION}.zip" figma-mcp-bridge

      # ── GitHub Release 업로드 ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Figma MCP Bridge v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 설치 방법

            1. 아래 `figma-mcp-bridge-v${{ steps.version.outputs.VERSION }}.zip` 다운로드 및 압축 해제
            2. `start.command` 더블클릭 (터미널이 열리고 서버 시작)
            3. Figma Desktop → Plugins → Development → **Import plugin from manifest…**
               → 압축 해제한 폴더의 `figma-plugin/manifest.json` 선택
            4. Plugins → Development → **MCP Bridge** 실행
            5. 플러그인 UI에 🟢 연결됨 표시 확인

            ## 요구사항
            - Node.js v18 이상
            - Figma Desktop 앱 (웹 버전 불가)

            자세한 사용법은 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) 참조.
          files: "figma-mcp-bridge-v${{ steps.version.outputs.VERSION }}.zip"
          draft: false
          prerelease: false
